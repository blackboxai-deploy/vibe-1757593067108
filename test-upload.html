<!DOCTYPE html>
<html>
<head>
    <title>Test Upload</title>
</head>
<body>
    <h1>Audio Separator Upload Test</h1>
    <form id="uploadForm">
        <input type="file" id="fileInput" accept=".mp3,.wav,.m4a,.mp4" required>
        <button type="submit">Upload File</button>
    </form>
    
    <div id="result"></div>
    
    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Please select a file');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(result, null, 2) + '</pre>';
                
                if (result.success) {
                    // Test separation
                    console.log('Starting separation for file:', result.file.id);
                    const sepResponse = await fetch('/api/separate', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            fileId: result.file.id,
                            qualityLevel: 'standard'
                        })
                    });
                    
                    const sepResult = await sepResponse.json();
                    console.log('Separation result:', sepResult);
                }
            } catch (error) {
                console.error('Upload error:', error);
                document.getElementById('result').innerHTML = '<div style="color: red;">Upload Error: ' + error.message + '</div>';
            }
        });
    </script>
</body>
</html>
